name: CI
on: [ push, pull_request ]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
      - name: Run PyTest
        run: |
          pip install pytest
          pytest tests/test_mock_db.py --data-path=data/metadata/mini