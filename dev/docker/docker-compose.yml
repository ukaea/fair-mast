services:
  # Service for hosting the API.
  # This container runs the FastAPI REST and GraphQL APIs
  api:
    container_name: mast-api
    build:
      context: ../../
      dockerfile: ./dev/docker/mast-api.Dockerfile
    image: mast-api:latest
    restart: always
    volumes:
      - ../../tests/mock_data:/test_data/
      - ../../data/:/data
      - ../../src:/code/src
    ports:
      - '8081:5000'
    entrypoint: 
      - "python"
      - "-m"
      - "uvicorn"
      - "src.api.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--reload"
    environment:
      - DATABASE_HOST=pg_container
      - DATABASE_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - dbnetwork

  # Service for the PostgreSQL Database
  # This container runs the PostgreSQL database which contains the metadata for MAST.
  meta_database:
    container_name: pg_container
    image: postgres:15.3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres:/data/postgres
      - ./:/app
    networks:
      - dbnetwork

  # Service for pgadmin
  # This container runs a pgadmin instance for administering the database
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_USER}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./:/app
    networks:
      - dbnetwork

  # Service for hardware monitoring exporter
  # This container runs a node_exporter instance used to export hardware metrics
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - dbnetwork
    ports:
      - 9100:9100

#Service for monitoring docker containers
  cadvisor:
      image: gcr.io/cadvisor/cadvisor
      container_name: cadvisor
      volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk:/dev/disk/:ro
      networks:
        - dbnetwork
      ports:
          - 8082:8080



  # Service for metric aggregator
  # This container runs a prometheus instance for collating all of the exposed metrics and transfering them to grafana
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - './prometheus.yml:/etc/prometheus/prometheus.yml'
    networks:
      - dbnetwork
    ports:
      - 9090:9090

  # Service for dashboarding service grafana
  # This container runs a grafana instance used to display the gathered metrics in dashboards
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
    #GF_SERVER_ROOT is only needed if running behind a reverse proxy and will break grafana if used without it
      GF_SERVER_ROOT_URL: https://mastapp.site/monitoring/
    networks:
      - dbnetwork
    ports:
      - 3000:3000
    volumes:
      - '../grafana/provisioning/:/etc/grafana/provisioning/'

networks:
  dbnetwork:
    name: dbnetwork
    driver: bridge

volumes:
    postgres:
    pgadmin:
    acme:
    certs:
    vhost:
    html:
